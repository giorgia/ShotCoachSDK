included:
  - Sources
  - Tests

disabled_rules:
  - trailing_whitespace

opt_in_rules:
  - empty_count
  - explicit_init
  - closure_spacing
  - fatal_error_message
  - force_unwrapping

line_length:
  warning: 120
  error: 150

type_name:
  min_length:
    warning: 3
  max_length:
    warning: 50
    error: 60

identifier_name:
  min_length:
    warning: 2
    error: 1
